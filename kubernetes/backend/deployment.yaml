apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2             
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 603761645100.dkr.ecr.us-east-1.amazonaws.com/q2-project-backend:latest
          ports:
            - containerPort: 3000
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: mongo-uri
            - name: PORT
              value: "3000"

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
           

          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            

          startupProbe:
            httpGet:
              path: /health/startup
              port: 3000
            failureThreshold: 30
            periodSeconds: 10
        

          resources:
            requests:
              memory: "128Mi"  
              cpu: "100m"       
            limits:
              memory: "256Mi"   
              cpu: "200m"